<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Exploration - Dominic Eriksson</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
    integrity="sha256-sA+e2soMuj9O6ZTuh5zx16ckZm+jxb0cl2v6H1rxbjg="
    crossorigin=""
  />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fdfdfd;
      color: #1c1c1e;
      margin: 0 auto;
      max-width: 960px;
      padding: 24px;
      line-height: 1.6;
    }

    h1 {
      color: #0071e3;
      text-align: center;
      margin-bottom: 24px;
    }

    #map {
      height: 600px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 113, 227, 0.3);
      margin-bottom: 16px;
    }

    label {
      font-weight: 600;
      margin-right: 10px;
      color: #0071e3;
    }

    select {
      font-size: 1rem;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #0071e3;
      background: white;
      color: #1c1c1e;
    }
  </style>
</head>

<body>
  <h1>Interactive Plankton Data Map</h1>

  <label for="month-select">Select Month:</label>
  <select id="month-select">
    <option value="all">All</option>
    <option value="1">January</option>
    <option value="2">February</option>
    <option value="3">March</option>
    <option value="4">April</option>
    <option value="5">May</option>
    <option value="6">June</option>
    <option value="7">July</option>
    <option value="8">August</option>
    <option value="9">September</option>
    <option value="10">October</option>
    <option value="11">November</option>
    <option value="12">December</option>
  </select>

  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
    integrity="sha256-o9N1j8JEwPccdo2r2TxUMxNyP0+nqQ04t/8M6I7F2Pk="
    crossorigin=""
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

  <script>
    // Initialize map centered on equator
    const map = L.map('map').setView([20, 0], 2);

    // Add OSM base layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 8,
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);

    let markers = L.layerGroup().addTo(map);
    let allData = [];

    // Load CSV file using PapaParse
    Papa.parse('plankton_data.csv', {
      download: true,
      header: true,
      dynamicTyping: true,
      complete: function (results) {
        allData = results.data;
        plotMarkers(allData);
      },
      error: function (err) {
        alert('Error loading CSV: ' + err.message);
      },
    });

    // Function to color circles based on 'value' (example gradient)
    function getColor(value) {
      return value > 75
        ? '#d73027'
        : value > 50
        ? '#fc8d59'
        : value > 25
        ? '#fee08b'
        : '#d9ef8b';
    }

    function plotMarkers(data) {
      markers.clearLayers();
      data.forEach((row) => {
        if (
          row.lat !== undefined &&
          row.lon !== undefined &&
          !isNaN(row.lat) &&
          !isNaN(row.lon)
        ) {
          const circle = L.circleMarker([row.lat, row.lon], {
            radius: 6,
            fillColor: getColor(row.value),
            color: '#333',
            weight: 1,
            opacity: 1,
            fillOpacity: 0.8,
          }).bindPopup(
            `<strong>Location:</strong> (${row.lat.toFixed(2)}, ${row.lon.toFixed(
              2
            )})<br><strong>Month:</strong> ${row.month}<br><strong>Value:</strong> ${
              row.value.toFixed(2)
            }`
          );
          markers.addLayer(circle);
        }
      });
    }

    // Filter markers by month dropdown
    const monthSelect = document.getElementById('month-select');
    monthSelect.addEventListener('change', function () {
      const selected = this.value;
      if (selected === 'all') {
        plotMarkers(allData);
      } else {
        const filtered = allData.filter((d) => d.month == +selected);
        plotMarkers(filtered);
      }
    });
  </script>
</body>

</html>
